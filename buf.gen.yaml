version: v2

managed:
  enabled: true
  override:
    - file_option: go_package_prefix
      value: github.com/rkrimper1/jarvis/api/pb
      path: proto

plugins:
# ── Go: protobuf messages ──────────────────────────────────────────
  - remote: buf.build/protocolbuffers/go
    out: api
    opt:
      - paths=source_relative

  # ── Go: gRPC service stubs ─────────────────────────────────────────
  - remote: buf.build/grpc/go
    out: api
    opt:
      - paths=source_relative

inputs:
  - directory: proto